<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Soft elegant background circle -->
  <circle cx="50" cy="50" r="45" fill="#FFF0F5" />
  
  <!-- Elegant perfume bottle cap (gold) -->
  <rect x="42" y="15" width="16" height="12" rx="2" fill="#D4AF37" />
  <rect x="45" y="27" width="10" height="4" fill="#AA841C" />
  
  <!-- Bottle Body (transparent glass with pink outline) -->
  <rect x="25" y="31" width="50" height="52" rx="12" stroke="#DB7093" stroke-width="4" fill="#FFFFFF" />
  
  <!-- Perfume Liquid (delicate pink fill) -->
  <rect x="29" y="42" width="42" height="37" rx="8" fill="#FFC0CB" opacity="0.8" />
  
  <!-- Minimalist label (gold border) -->
  <rect x="37" y="48" width="26" height="16" rx="2" stroke="#D4AF37" stroke-width="1.5" fill="#FFFFFF" />
  
  <!-- Label lines -->
  <line x1="42" y1="53" x2="58" y2="53" stroke="#DB7093" stroke-width="2" stroke-linecap="round" />
  <line x1="45" y1="59" x2="55" y2="59" stroke="#AA841C" stroke-width="1.5" stroke-linecap="round" />
</svg>
