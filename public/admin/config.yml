backend:
  name: github
  repo: efeitodigitalcontato-ops/afiliados-blog-perfumes
  branch: main
  site_domain: bibliolab.com.br
  # Usamos a API própria e segura que criamos para o seu domínio na Vercel
  base_url: https://bibliolab.com.br
  auth_endpoint: api/auth

# Permite rodar o CMS localmente com 'npx decap-cms-proxy-server'
local_backend: true

# Configurações de Mídia
media_folder: "public/uploads"
public_folder: "/uploads"

# Coleções de Conteúdo
collections:
  - name: "blog"
    label: "Artigos"
    label_singular: "Artigo"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    format: "frontmatter"
    fields:
      - { label: "Título", name: "title", widget: "string" }
      - { label: "Descrição (SEO)", name: "description", widget: "text" }
      - { label: "Data de Publicação", name: "pubDate", widget: "datetime", type: "date", format: "YYYY-MM-DD", default: "" }
      - { label: "Imagem de Destaque", name: "heroImage", widget: "image", required: false }
      - { label: "Categoria", name: "category", widget: "select", options: ["perfumes-masculinos", "perfumes-femininos", "dicas", "analises"], default: "perfumes-masculinos", required: false }
      - { label: "Autor", name: "author", widget: "string", default: "Equipe Bibliolab" }
      - label: "Produtos Analisados"
        name: "reviewedProducts"
        widget: "list"
        required: false
        fields:
          - { label: "ID do Produto", name: "id", widget: "string", required: false }
          - { label: "Título do Produto", name: "title", widget: "string" }
          - { label: "Imagem do Produto", name: "image", widget: "image" }
          - { label: "Avaliação (Nota)", name: "rating", widget: "number", value_type: "float" }
          - { label: "Quantidade de Avaliações", name: "reviewsCount", widget: "string" }
          - { label: "Link de Afiliado (Mercado Livre/Amazon)", name: "amazonLink", widget: "string" }
          - { label: "Estimativa de Preço", name: "priceEstimate", widget: "string" }
          - { label: "Especificações (Uma por linha)", name: "specs", widget: "list", summary: "{{fields.value}}", field: { label: "Item", name: "item", widget: "string" } }
          - { label: "Prós (Um por linha)", name: "pros", widget: "list", summary: "{{fields.value}}", field: { label: "Item", name: "item", widget: "string" } }
          - { label: "Contras (Um por linha)", name: "cons", widget: "list", summary: "{{fields.value}}", field: { label: "Item", name: "item", widget: "string" } }
          - { label: "Descrição/Resumo do Produto", name: "description", widget: "text" }
      - { label: "Corpo do Artigo", name: "body", widget: "markdown" }
